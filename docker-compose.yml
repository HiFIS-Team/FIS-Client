# 홈서버 배포용 — nginx가 앞단에서 앱(127.0.0.1:3000)으로 프록시한다고 가정.
# 서버에 .env 파일을 두고 아래 변수들을 채우세요 (FIS_DB_*, AUTH_*, ADMIN_EMAILS).

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      # 분리 변수로 Prisma 연결 문자열 조립 (host는 서비스명 db)
      DATABASE_URL: postgresql://${FIS_DB_USER}:${FIS_DB_PASSWORD}@db:5432/${FIS_DB_NAME}?schema=public
      UPLOAD_DIR: /app/uploads
      # Auth.js (프록시 뒤에서 동작하려면 trust host 필요)
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: ${AUTH_URL}
      # 알림톡 (Solapi) — 공통
      SOLAPI_API_KEY: ${SOLAPI_API_KEY}
      SOLAPI_API_SECRET: ${SOLAPI_API_SECRET}
      SOLAPI_SENDER: ${SOLAPI_SENDER}
      ALERT_PHONES: ${ALERT_PHONES}
      # 알림톡 — 지점별 (1=화순점, 2=첨단점, 3=동광주점)
      SOLAPI_PFID_1: ${SOLAPI_PFID_1}
      SOLAPI_TEMPLATE_NEW_1: ${SOLAPI_TEMPLATE_NEW_1}
      SOLAPI_TEMPLATE_RECEIVED_1: ${SOLAPI_TEMPLATE_RECEIVED_1}
      SOLAPI_TEMPLATE_DOCPASS_1: ${SOLAPI_TEMPLATE_DOCPASS_1}
      SOLAPI_TEMPLATE_FINALPASS_1: ${SOLAPI_TEMPLATE_FINALPASS_1}
      SOLAPI_TEMPLATE_FAIL_1: ${SOLAPI_TEMPLATE_FAIL_1}
      SOLAPI_PFID_2: ${SOLAPI_PFID_2}
      SOLAPI_TEMPLATE_NEW_2: ${SOLAPI_TEMPLATE_NEW_2}
      SOLAPI_TEMPLATE_RECEIVED_2: ${SOLAPI_TEMPLATE_RECEIVED_2}
      SOLAPI_TEMPLATE_DOCPASS_2: ${SOLAPI_TEMPLATE_DOCPASS_2}
      SOLAPI_TEMPLATE_FINALPASS_2: ${SOLAPI_TEMPLATE_FINALPASS_2}
      SOLAPI_TEMPLATE_FAIL_2: ${SOLAPI_TEMPLATE_FAIL_2}
      SOLAPI_PFID_3: ${SOLAPI_PFID_3}
      SOLAPI_TEMPLATE_NEW_3: ${SOLAPI_TEMPLATE_NEW_3}
      SOLAPI_TEMPLATE_RECEIVED_3: ${SOLAPI_TEMPLATE_RECEIVED_3}
      SOLAPI_TEMPLATE_DOCPASS_3: ${SOLAPI_TEMPLATE_DOCPASS_3}
      SOLAPI_TEMPLATE_FINALPASS_3: ${SOLAPI_TEMPLATE_FINALPASS_3}
      SOLAPI_TEMPLATE_FAIL_3: ${SOLAPI_TEMPLATE_FAIL_3}
    volumes:
      - fis_uploads:/app/uploads
      # 인물 사진(깃 제외분)을 서버 볼륨에 보관
      - fis_private_images:/app/public/images/private
    # nginx만 접근하도록 로컬호스트에 바인딩
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${FIS_DB_USER}
      POSTGRES_PASSWORD: ${FIS_DB_PASSWORD}
      POSTGRES_DB: ${FIS_DB_NAME}
    volumes:
      - fis_db_data:/var/lib/postgresql/data
    # ports 미설정 → 외부에서 DB 직접 접근 불가 (앱 컨테이너만 접근)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FIS_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fis_db_data:
  fis_uploads:
  fis_private_images:
